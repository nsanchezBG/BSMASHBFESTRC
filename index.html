<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BURGER SMASH by Burgerboy</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Prevención agresiva de scroll y rebote en móviles */
        body, html {
            margin: 0; padding: 0; background-color: #1d1e1b; overflow: hidden;
            width: 100%; height: 100%; position: fixed; inset: 0;
            touch-action: none; user-select: none; -webkit-user-drag: none;
            -webkit-overflow-scrolling: auto;
        }
        
        .caprasimo { font-family: 'Caprasimo', serif; }
        .font-sans { font-family: sans-serif; }
        
        /* Animaciones */
        .tipsy { animation: tipsy 3s ease-in-out infinite alternate; }
        .tipsy-mild { animation: tipsy-mild 4s ease-in-out infinite alternate; }
        .pulse { animation: pulse 1.5s infinite; }
        .pendulum { transform-origin: bottom center; animation: pendulum 2s ease-in-out infinite alternate; }
        .falling-ingredient { animation: fallAndSpin linear forwards; }
        
        /* Utilidades visuales retro */
        .text-stroke { text-shadow: 2px 2px 0 #1d1e1b, -2px -2px 0 #1d1e1b, 2px -2px 0 #1d1e1b, -2px 2px 0 #1d1e1b; }
        .text-stroke-small { text-shadow: 1px 1px 0 #1d1e1b, -1px -1px 0 #1d1e1b, 1px -1px 0 #1d1e1b, -1px 1px 0 #1d1e1b; }
        .text-stroke-yellow { text-shadow: 1px 1px 0 #1d1e1b; }
        
        /* Botones 3D */
        .btn-shadow { box-shadow: 0px 8px 0px #1d1e1b; transition: transform 0.1s, box-shadow 0.1s; }
        .btn-shadow:active { transform: translateY(8px); box-shadow: 0px 0px 0px #1d1e1b; }
        .btn-shadow-small { box-shadow: 0px 5px 0px #1d1e1b; transition: transform 0.1s, box-shadow 0.1s; }
        .btn-shadow-small:active { transform: translateY(5px); box-shadow: 0px 0px 0px #1d1e1b; }

        /* Keyframes */
        @keyframes tipsy { 0% { transform: rotate(-3deg) scale(0.98); } 100% { transform: rotate(3deg) scale(1.02); } }
        @keyframes tipsy-mild { 0% { transform: rotate(-1.5deg) scale(0.99); } 100% { transform: rotate(1.5deg) scale(1.01); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
        @keyframes pendulum { 0% { transform: rotate(-8deg); } 100% { transform: rotate(8deg); } }
        @keyframes fallAndSpin { 0% { transform: translateY(-100px) rotate(0deg); } 100% { transform: translateY(120vh) rotate(360deg); } }

        /* Scrollbar retro para modal */
        .retro-scroll::-webkit-scrollbar { width: 8px; }
        .retro-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .retro-scroll::-webkit-scrollbar-thumb { background: #1d1e1b; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Script principal usando Babel y ES Modules -->
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const app = firebaseConfig ? initializeApp(firebaseConfig) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'burger-smash-2026';

        function App() {
            // --- ESTADOS ---
            const [screen, setScreen] = useState('splash');
            const [loaded, setLoaded] = useState(false);
            const [fallingItems, setFallingItems] = useState([]);
            const [user, setUser] = useState(null);

            // Formulario de Registro
            const [name, setName] = useState('');
            const [dni, setDni] = useState('');
            const [tyc, setTyc] = useState(false);
            const [namePlaceholder, setNamePlaceholder] = useState('');
            const [tycError, setTycError] = useState(false);
            const [playText, setPlayText] = useState('JUGAR');

            // Modales
            const [showTyc, setShowTyc] = useState(false);
            const [showRanking, setShowRanking] = useState(false);
            const [leaderboard, setLeaderboard] = useState([]);
            const [loadingRanking, setLoadingRanking] = useState(false);

            const baseUrl = 'https://github.com/nsanchezBG/BSMASHBFESTRC/blob/main/';
            const rawSuffix = '?raw=true';
            const bgMusic = useRef(null);

            // --- EFECTOS E INICIALIZACIÓN ---
            useEffect(() => {
                const assetsToLoad = [
                    'overlay.png', 'fondosplash.png', 'fondoregistro1.png', 
                    'logo.png', 'cartel.png', 'registro.png', 
                    'carne.png', 'lechuga.png', 'papas.png', 'tomate.png'
                ];
                
                let loadedCount = 0;
                assetsToLoad.forEach(asset => {
                    const img = new Image();
                    img.src = baseUrl + asset + rawSuffix;
                    img.onload = () => { loadedCount++; if (loadedCount === assetsToLoad.length) setLoaded(true); };
                    img.onerror = () => { loadedCount++; if (loadedCount === assetsToLoad.length) setLoaded(true); };
                });

                bgMusic.current = new Audio(baseUrl + 'Sugarcup-Shuffle.aac' + rawSuffix);
                bgMusic.current.loop = true;
                bgMusic.current.volume = 0.5;

                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                
                return () => {
                    unsubscribe();
                };
            }, []);

            // Lluvia de ingredientes
            useEffect(() => {
                if (screen !== 'splash' || !loaded) return;
                const types = ['carne.png', 'lechuga.png', 'papas.png', 'tomate.png'];
                
                const interval = setInterval(() => {
                    const newItem = {
                        id: Math.random().toString(36).substr(2, 9),
                        type: types[Math.floor(Math.random() * types.length)],
                        size: Math.random() * 40 + 40,
                        left: Math.random() * 90,
                        duration: Math.random() * 3 + 3
                    };
                    
                    setFallingItems(prev => [...prev, newItem]);
                    
                    setTimeout(() => {
                        setFallingItems(prev => prev.filter(i => i.id !== newItem.id));
                    }, newItem.duration * 1000);
                    
                }, 800);

                return () => clearInterval(interval);
            }, [screen, loaded]);

            // --- ACCIONES ---
            const handleEnterClick = () => {
                if (!loaded) return;
                bgMusic.current?.play().catch(e => console.log("Audio bloqueado:", e));
                setScreen('register');
            };

            const handlePlayClick = () => {
                if (!name.trim() || !dni.trim()) {
                    setNamePlaceholder("¡FALTAN DATOS!");
                    setName('');
                    setDni('');
                    return;
                }
                if (!tyc) {
                    setTycError(true);
                    setTimeout(() => setTycError(false), 1000);
                    return;
                }

                window.playerData = { name: name.trim(), dni: dni.trim() };
                
                setPlayText("CARGANDO...");
                setTimeout(() => {
                    setPlayText("JUGAR");
                    console.log("Transición a tutorial lista. (Siguiente iteración)");
                }, 1000);
            };

            const fetchLeaderboard = async () => {
                setShowRanking(true);
                if (!user || !db) return;
                setLoadingRanking(true);
                try {
                    const lbRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    const snapshot = await getDocs(lbRef);
                    let scores = [];
                    snapshot.forEach(doc => scores.push({ id: doc.id, ...doc.data() }));
                    
                    scores.sort((a, b) => b.score - a.score);
                    setLeaderboard(scores.slice(0, 10));
                } catch (error) {
                    console.error("Error cargando leaderboard:", error);
                }
                setLoadingRanking(false);
            };

            return (
                // FIX FULLSCREEN: fixed inset-0 w-full h-full previene cualquier posibilidad de scroll
                <div className="fixed inset-0 flex justify-center items-center bg-[#1d1e1b]">
                    <div className="relative w-full h-full max-w-[500px] bg-[#1d1e1b] overflow-hidden shadow-[0_0_20px_rgba(0,0,0,0.8)]">
                        
                        {/* Overlay Global Texturizado FIX: z-9999 absoluto, mixBlendMode directo, opacidad alta */}
                        <div 
                            className="absolute inset-0 z-[9999] pointer-events-none bg-cover bg-center" 
                            style={{ 
                                backgroundImage: `url(${baseUrl}overlay.png${rawSuffix})`,
                                mixBlendMode: 'multiply',
                                opacity: 0.85
                            }}
                        ></div>

                        {/* --- PANTALLA 1: SPLASH --- */}
                        {screen === 'splash' && (
                            <div 
                                className="absolute inset-0 z-10 flex flex-col items-center justify-between pt-[10vh] bg-cover bg-center cursor-pointer"
                                style={{ backgroundImage: `url(${baseUrl}fondosplash.png${rawSuffix})` }}
                                onClick={handleEnterClick}
                            >
                                {/* Contenedor de ingredientes que caen */}
                                <div className="absolute inset-0 overflow-hidden z-[1] pointer-events-none">
                                    {fallingItems.map(item => (
                                        <img 
                                            key={item.id}
                                            src={`${baseUrl}${item.type}${rawSuffix}`} 
                                            alt="ingrediente"
                                            className="absolute falling-ingredient"
                                            style={{ 
                                                width: `${item.size}px`, 
                                                left: `${item.left}vw`, 
                                                animationDuration: `${item.duration}s` 
                                            }}
                                        />
                                    ))}
                                </div>

                                {/* Logo Centrado dinámicamente en el espacio sobrante */}
                                <div className="flex-grow flex items-center justify-center w-full mt-4">
                                    <div className="relative z-[2] w-[90%] max-w-[400px] tipsy">
                                        <img src={`${baseUrl}logo.png${rawSuffix}`} alt="Logo" className="w-full h-auto drop-shadow-[0_8px_0_#1d1e1b]"/>
                                    </div>
                                </div>

                                {/* Texto ENTRAR - Se ubica a media distancia gracias al margen inferior */}
                                <div className="text-[#fff3e2] text-2xl caprasimo uppercase text-stroke pulse tracking-widest z-[2] mb-[8vh]">
                                    {loaded ? 'ENTRAR' : 'CARGANDO...'}
                                </div>

                                {/* Cartel Metrónomo - Con margen negativo para ocular el corte inferior */}
                                <div className="w-[45%] max-w-[180px] pendulum z-[2] -mb-[5%]">
                                    <img src={`${baseUrl}cartel.png${rawSuffix}`} alt="Burger Fest" className="w-full h-auto drop-shadow-[0_5px_0_#1d1e1b]"/>
                                </div>
                            </div>
                        )}

                        {/* --- PANTALLA 2: REGISTRO --- */}
                        {screen === 'register' && (
                            <div 
                                className="absolute inset-0 z-10 flex flex-col items-center justify-between pt-[6vh] pb-[8vh] bg-cover bg-center"
                                style={{ backgroundImage: `url(${baseUrl}fondoregistro1.png${rawSuffix})` }}
                            >
                                {/* Grupo Superior: Logos - Ajustado para no causar overflow */}
                                <div className="flex flex-col items-center w-full">
                                    <img src={`${baseUrl}logo.png${rawSuffix}`} alt="Logo" className="w-[50%] max-w-[200px] tipsy mb-2" />
                                    <img src={`${baseUrl}registro.png${rawSuffix}`} alt="Registro" className="w-[60%] max-w-[240px] tipsy-mild" />
                                </div>

                                {/* Grupo Medio: Formulario */}
                                <div className="flex flex-col w-[80%] max-w-[320px] gap-2">
                                    <div className="flex flex-col items-center">
                                        <label className="text-[#fff3e2] text-lg caprasimo text-stroke mb-1 tracking-wider">NOMBRE:</label>
                                        <input 
                                            type="text" 
                                            value={name}
                                            onChange={(e) => setName(e.target.value)}
                                            placeholder={namePlaceholder}
                                            maxLength="15"
                                            className="w-full bg-[#fff3e2] border-[4px] border-[#1d1e1b] rounded-full px-4 py-1.5 caprasimo text-lg text-[#1d1e1b] text-center outline-none shadow-[inset_0_5px_0_rgba(0,0,0,0.3)] placeholder:text-[#1d1e1b]/50"
                                        />
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <label className="text-[#fff3e2] text-lg caprasimo text-stroke mb-1 tracking-wider">DNI/CE:</label>
                                        <input 
                                            type="tel" 
                                            value={dni}
                                            onChange={(e) => setDni(e.target.value.replace(/[^0-9]/g, ''))} // Solo números
                                            maxLength="12"
                                            className="w-full bg-[#fff3e2] border-[4px] border-[#1d1e1b] rounded-full px-4 py-1.5 caprasimo text-lg text-[#1d1e1b] text-center outline-none shadow-[inset_0_5px_0_rgba(0,0,0,0.3)]"
                                        />
                                    </div>
                                    
                                    <div className="flex items-start gap-2 mt-1 px-1">
                                        <div className="relative flex-shrink-0 cursor-pointer mt-1" onClick={() => setTyc(!tyc)}>
                                            <div className="w-5 h-5 bg-[#fff3e2] border-[3px] border-[#1d1e1b] rounded flex items-center justify-center">
                                                {tyc && <span className="text-[#1d1e1b] caprasimo text-sm leading-none mt-1">X</span>}
                                            </div>
                                        </div>
                                        <div 
                                            className={`text-[0.7rem] leading-tight caprasimo cursor-pointer underline transition-colors duration-300 text-stroke-small ${tycError ? 'text-[#c7473d]' : 'text-[#fff3e2]'}`}
                                            onClick={() => setShowTyc(true)}
                                        >
                                            Acepto los términos y condiciones y el tratamiento opcional de datos.
                                        </div>
                                    </div>
                                </div>

                                {/* Grupo Inferior: Botones - Espaciado (gap) incrementado a gap-6 */}
                                <div className="flex flex-col items-center gap-6 w-full">
                                    <button 
                                        onClick={handlePlayClick}
                                        className="bg-[#fff3e2] text-[#1d1e1b] border-[5px] border-[#1d1e1b] rounded-[40px] py-2 px-10 caprasimo text-3xl btn-shadow"
                                    >
                                        {playText}
                                    </button>
                                    <button 
                                        onClick={fetchLeaderboard}
                                        className="bg-[#c7473d] text-[#fff3e2] border-[4px] border-[#1d1e1b] rounded-full py-1 px-6 caprasimo text-lg btn-shadow-small tipsy-mild"
                                    >
                                        RANKING
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* --- MODAL: TYC --- */}
                        {showTyc && (
                            <div className="absolute inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
                                <div className="bg-[#fff3e2] border-[6px] border-[#1d1e1b] rounded-2xl w-[85%] max-h-[80%] p-5 relative flex flex-col shadow-[0_10px_0_#1d1e1b]">
                                    <button 
                                        onClick={() => setShowTyc(false)} 
                                        className="absolute -top-4 -right-4 bg-[#c7473d] text-[#fff3e2] border-[4px] border-[#1d1e1b] rounded-full w-10 h-10 flex items-center justify-center caprasimo text-xl btn-shadow-small"
                                    >
                                        X
                                    </button>
                                    <h2 className="text-[#1d1e1b] text-center text-xl caprasimo mb-3 mt-0">Términos y Condiciones</h2>
                                    <div className="overflow-y-auto flex-grow font-sans text-[0.85rem] text-[#1d1e1b] leading-relaxed pr-2 retro-scroll">
                                        <p className="mb-2"><strong>1. Aceptación:</strong> Al participar en BURGER SMASH, aceptas estos términos y condiciones para el evento Burgerfest 2026.</p>
                                        <p className="mb-2"><strong>2. Uso de datos:</strong> Autorizas a Burgerboy a recopilar tu Nombre y DNI/CE con el único fin de identificarte en la tabla de clasificación y contactarte.</p>
                                        <p className="mb-2"><strong>3. Mecánica:</strong> El juego es de habilidad. Las puntuaciones se guardan automáticamente con conexión a internet.</p>
                                        <p className="mb-2"><strong>4. Restricciones:</strong> Cualquier intento de manipulación del sistema o bots resultará en descalificación.</p>
                                        <p><strong>5. Privacidad:</strong> Tus datos no serán compartidos con terceros sin tu consentimiento.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- MODAL: RANKING --- */}
                        {showRanking && (
                            <div className="absolute inset-0 bg-black/80 z-[100] flex items-center justify-center p-4">
                                <div className="bg-[#fff3e2] border-[6px] border-[#1d1e1b] rounded-2xl w-[85%] max-h-[80%] p-5 relative flex flex-col shadow-[0_10px_0_#1d1e1b]">
                                    <button 
                                        onClick={() => setShowRanking(false)} 
                                        className="absolute -top-4 -right-4 bg-[#c7473d] text-[#fff3e2] border-[4px] border-[#1d1e1b] rounded-full w-10 h-10 flex items-center justify-center caprasimo text-xl btn-shadow-small"
                                    >
                                        X
                                    </button>
                                    <h2 className="text-[#1d1e1b] text-center text-xl caprasimo mb-4 mt-0">TOP 10 SMASHERS</h2>
                                    <div className="overflow-y-auto flex-grow pr-2 retro-scroll">
                                        <ul className="list-none p-0 m-0 caprasimo text-lg">
                                            {loadingRanking ? (
                                                <li className="text-center font-sans text-base">Cargando data...</li>
                                            ) : leaderboard.length === 0 ? (
                                                <li className="text-center font-sans text-base">¡Aún no hay puntuaciones! Sé el primero.</li>
                                            ) : (
                                                leaderboard.map((entry, index) => (
                                                    <li key={entry.id} className="flex justify-between py-2 border-b-2 border-dashed border-[#1d1e1b] last:border-none">
                                                        <span className="text-[#c7473d] w-8">#{index + 1}</span>
                                                        <span className="flex-grow text-left pl-2 whitespace-nowrap overflow-hidden text-ellipsis">{entry.name}</span>
                                                        <span className="text-[#fab934] text-stroke-yellow">{entry.score} pts</span>
                                                    </li>
                                                ))
                                            )}
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
